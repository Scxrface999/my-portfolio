<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; text-align: center; }
        header { background-color: #222; color: white; padding: 50px 20px; }
        section { padding: 40px 20px; max-width: 600px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #218838; }
        .skills { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .skill-box { background: #ddd; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <p>Welcome to my college semester project!</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>Your details will go here!</p>
    </section>

    <section>
        <h2>My Skills</h2>
        <div class="skills">
            <div class="skill-box">Python</div>
            <div class="skill-box">HTML</div>
            <div class="skill-box">CSS</div>
        </div>
    </section>

    <section>
        <h2>Contact Me</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <p id="status"></p>
    </section>

    <script>
        // This Javascript connects the frontend button to your running server
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const statusText = document.getElementById('status');
            
            statusText.innerText = "Sending...";

            try {
                const response = await fetch('http://localhost:3000/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, message })
                });
                
                if (response.ok) {
                    statusText.innerText = "Message saved to database successfully!";
                    statusText.style.color = "green";
                    document.getElementById('contactForm').reset();
                } else {
                    statusText.innerText = "Error saving message.";
                    statusText.style.color = "red";
                }
            } catch (error) {
                statusText.innerText = "Server is not running or connected.";
                statusText.style.color = "red";
            }
        });
    </script>
</body>
</html>
